<div class="chat-exporter-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>📋 ST-Chat-Exporter</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <p><b>Формат копирования:</b></p>
            <div>
                <input id="ce_plain_text" type="checkbox" />
                <label for="ce_plain_text">Сплошной текст с отступами</label>
            </div>
            <div>
                <input id="ce_names" type="checkbox" />
                <label for="ce_names">Имя персонажа / юзера</label>
            </div>
            <div>
                <input id="ce_timestamp" type="checkbox" />
                <label for="ce_timestamp">Дата и время</label>
            </div>
            <div>
                <input id="ce_numbers" type="checkbox" />
                <label for="ce_numbers">Номера сообщений</label>
            </div>
            <hr />
            <input id="ce_open_btn" class="menu_button" type="submit" value="📋 Открыть экспортёр" />
        </div>
    </div>
</div>
